opencollection: 1.0.0

info:
  name: rplLibrary-docs
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

docs:
  content: |-
    # API Documentation

    Base URL:
    `http://localhost:8080`

    ## Authentication

    ### 1) Register User
    - **Method:** `POST`
    - **Path:** `/auth/register`
    - **Auth:** No
    - **Description:** Register a new user.

    ### 2) Login
    - **Method:** `POST`
    - **Path:** `/auth/login`
    - **Auth:** No
    - **Description:** Login and get token.

    ### 3) Register Admin
    - **Method:** `POST`
    - **Path:** `/auth/admin/register`
    - **Auth:** No
    - **Description:** Register a new admin user.

    ---

    ## User

    > All routes below require `AuthMiddleware()`.

    ### 4) Upload Profile Picture
    - **Method:** `POST`
    - **Path:** `/api/profile`
    - **Auth:** Yes
    - **Description:** Upload user profile picture.

    ---

    ## Books

    > All routes below are under `/api/books` and require `AuthMiddleware()`.

    ### 5) Borrow Book
    - **Method:** `POST`
    - **Path:** `/api/books/borrow`
    - **Auth:** Yes
    - **Description:** Borrow a book.

    ### 6) Borrow Multiple Books
    - **Method:** `POST`
    - **Path:** `/api/books/borrows`
    - **Auth:** Yes
    - **Description:** Borrow multiple books at once.

    ### 7) Find Books by Status
    - **Method:** `GET`
    - **Path:** `/api/books/status/:status`
    - **Auth:** Yes
    - **Description:** Get books by status.
    - **Path Params:**
      - `status` : book status, for example `available` or `borrowed`

    ### 8) Get All Categories
    - **Method:** `GET`
    - **Path:** `/api/books/categories`
    - **Auth:** Yes
    - **Description:** Get all categories for user access.

    ### 9) Find Books by Category
    - **Method:** `GET`
    - **Path:** `/api/books/category/:category`
    - **Auth:** Yes
    - **Description:** Get books by category.
    - **Path Params:**
      - `category` : category name

    ### 10) Search Books
    - **Method:** `GET`
    - **Path:** `/api/books/search`
    - **Auth:** Yes
    - **Description:** Search books.
    - **Query Params:**
      - `q` : search keyword, for example `harry`

    ---

    ## Admin

    > All routes below require both `AuthMiddleware()` and `AdminMiddleware()`.

    ### 11) Set Multiple Books Returned
    - **Method:** `POST`
    - **Path:** `/admin/books/returned`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Mark multiple borrowed books as returned.

    ### 12) Create Book
    - **Method:** `POST`
    - **Path:** `/admin/book`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Create a new book.

    ### 13) Get All Books
    - **Method:** `GET`
    - **Path:** `/admin/book`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Get all books.

    ### 14) Get Book by ID
    - **Method:** `GET`
    - **Path:** `/admin/book/:id`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Get book detail by ID.
    - **Path Params:**
      - `id` : book ID

    ### 15) Update Book
    - **Method:** `PUT`
    - **Path:** `/admin/book/:id`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Update book data.
    - **Path Params:**
      - `id` : book ID

    ### 16) Delete Book
    - **Method:** `DELETE`
    - **Path:** `/admin/book/:id`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Delete a book.
    - **Path Params:**
      - `id` : book ID

    ### 17) Upload Book Cover
    - **Method:** `POST`
    - **Path:** `/admin/book/cover`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Upload book cover/profile picture.

    ### 18) Set Book Returned
    - **Method:** `POST`
    - **Path:** `/admin/book/returned`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Mark a borrowed book as returned.

    ### 19) Create Category
    - **Method:** `POST`
    - **Path:** `/admin/category`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Create a new category.

    ### 20) Get All Categories
    - **Method:** `GET`
    - **Path:** `/admin/category`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Get all categories.

    ### 21) Get Category by ID
    - **Method:** `GET`
    - **Path:** `/admin/category/:id`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Get category detail by ID.
    - **Path Params:**
      - `id` : category ID

    ### 22) Update Category
    - **Method:** `PUT`
    - **Path:** `/admin/category/:id`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Update category data.
    - **Path Params:**
      - `id` : category ID

    ### 23) Delete Category
    - **Method:** `DELETE`
    - **Path:** `/admin/category/:id`
    - **Auth:** Yes
    - **Role:** Admin
    - **Description:** Delete a category.

    ---

    ## Notes

    - Use `Authorization: Bearer <token>` for protected routes.
    - Routes under `/api` require authentication.
    - Routes under `/api/books` are for authenticated users.
    - Routes under `/admin` require both authentication and admin access.
    - The search endpoint uses query parameter `q`.
    - The category filter uses the category name in the path parameter.
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
